name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (training + dev, CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e '.[training,dev]'
      - name: Ruff
        run: ruff check olmoearth2 configs tests
      - name: Pytest (non-slow; data/parity tests skip without weka/old-repo)
        run: pytest tests/ -q -m "not slow"

  upgrade-canary:
    # Surfaces breakage from a newer ai2-olmo-core before we pin to it.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e '.[training,dev]'
          pip install --upgrade ai2-olmo-core
          pytest tests/ -q -m "not slow"
